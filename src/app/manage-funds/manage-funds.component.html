<div class="row">
    <div class="col-lg-2 col-md-3 col-sm-12 col-12">
        <div class="nameCard">
            <div class="title-heading">
                <h6>Manage Funds</h6>
            </div>
        </div>
    </div>
</div>
<div class="new-customer">
    <div class="row">
        <div class="col-lg-3 col-md-12 col-sm-12 col-12">

        </div>
        <div class="col-lg-6 col-md-12 col-sm-12 col-12">
            <div class="new-heading">
                <h2>Manage Funds</h2>
            </div>
            <form [formGroup]="fundForm" (ngSubmit)="fundForm.status !== 'INVALID' && addFund()">
                <div [ngClass]="className" role="alert">
                    {{message}}
                </div>
                <div class="user-details">
                    <div class="input-box">
                        <div class="form-group">
                            <span class="details"> Select Account:</span>
                            <select class="form-select" formControlName="fbAccount" aria-label="Default select example">
                                <option value="null">Select Account</option>
                                <option value="Admix Main">Admix Main</option>
                                <option value="Admix Logo">Admix Logo</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-box">
                        <div class="form-group">
                            <span class="details">Enter Amount:</span>
                            <input type="text" class="form-control" formControlName="amount" placeholder="Enter Amount">
                        </div>
                    </div>
                    <div class="input-box">
                        <div class="form-group">
                            <span class="details"> Closing Date: </span>
                            <input type="datetime-local" class="form-control" formControlName="fundDate"
                                [ngClass]="{error:getControls('fundDate')?.errors && getControls('fundDate')?.touched}"
                                placeholder="Enter Fund Date">
                            <div *ngIf="getControls('fundDate')?.errors && getControls('fundDate')?.touched">
                                <label class="text-danger" *ngIf="getControls('fundDate')?.errors?.['required']"> Fund Date is Required </label> 
                            </div>
                        </div>
                    </div>
                </div>
                <input type="submit" [disabled]="fundForm.status === 'INVALID'" class="btn btn-success">
            </form>
        </div>
        <div class="col-lg-3">

        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-2 col-md-2 col-sm-6 col-6">
        <div class="nameCard">
            <div class="title-heading">
                <h6>Fund Details</h6>
            </div>
        </div>
    </div>
</div> 
<div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12 col-12">
        <div class="month-picker-card">
            <input type="month" class="month-input" [(ngModel)]="selectedMonth" (change)="loadFunds()"/>
        </div>
        <div class="table-scroll">
            <table class="table table-striped table-responsive">
                <thead class="sticky-header">
                    <tr>
                        <th scope="col">No.</th>
                        <th scope="col">Date</th>
                        <th scope="col">Account</th>
                        <th scope="col">Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let f of funds; let i = index">
                        <td>{{i+1}}</td>
                        <td>{{f.fundDate | date:'dd-MM-yyyy'}}</td>
                        <td>{{f.fbAccount}}</td>
                        <td>{{f.amount}}</td>
                    </tr>
                    <tr *ngIf="funds.length > 0">
                        <td colspan="4" class="text-center fw-bold">=========================</td>
                    </tr>
                    <tr *ngFor="let acc of getAccounts()" class="fw-bold">
                        <td colspan="3" class="text-end">
                            TOTAL ({{ acc }})
                        </td>
                        <td>{{accountTotals[acc]}}</td>
                    </tr>
                    <tr class="fw-bold table-warning" *ngIf="funds.length > 0">
                        <td colspan="3" class="text-end">
                            GRAND TOTAL
                        </td>
                        <td>{{grandTotal}}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
